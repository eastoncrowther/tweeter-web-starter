AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for Tweeter Milestone 3
Globals:
  Function:
    Timeout: 10
    Runtime: nodejs18.x
    MemorySize: 256
    Tracing: Active
  Api:
    Cors:
      AllowMethods: '''OPTIONS,POST'''
      AllowHeaders: '''Content-Type'''
      AllowOrigin: '''*'''
Resources:
  GetFollowerCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowerCountFunction
      Handler: GetFollowerCountHandler.handler
      Events:
        GetFollowerCountApi:
          Type: Api
          Properties:
            Path: /follower/count
            Method: post
    Metadata:
      SamResourceId: GetFollowerCountFunction
  GetFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweeCountFunction
      Handler: GetFolloweeCountHandler.handler
      Events:
        GetFolloweeCountApi:
          Type: Api
          Properties:
            Path: /followee/count
            Method: post
    Metadata:
      SamResourceId: GetFolloweeCountFunction
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LoginFunction
      Handler: LoginHandler.handler
      Events:
        LoginApi:
          Type: Api
          Properties:
            Path: /login
            Method: post
    Metadata:
      SamResourceId: LoginFunction
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RegisterFunction
      Handler: RegisterHandler.handler
      Events:
        RegisterApi:
          Type: Api
          Properties:
            Path: /register
            Method: post
    Metadata:
      SamResourceId: RegisterFunction
  FollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: FollowFunction
      Handler: FollowHandler.handler
      Events:
        FollowApi:
          Type: Api
          Properties:
            Path: /follow
            Method: post
    Metadata:
      SamResourceId: FollowFunction
  UnfollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UnfollowFunction
      Handler: UnfollowHandler.handler
      Events:
        UnfollowApi:
          Type: Api
          Properties:
            Path: /unfollow
            Method: post
    Metadata:
      SamResourceId: UnfollowFunction
  PostStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: PostStatusFunction
      Handler: PostStatusHandler.handler
      Events:
        PostStatusApi:
          Type: Api
          Properties:
            Path: /status/post
            Method: post
    Metadata:
      SamResourceId: PostStatusFunction
  LogoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LogoutFunction
      Handler: LogoutHandler.handler
      Events:
        LogoutApi:
          Type: Api
          Properties:
            Path: /logout
            Method: post
    Metadata:
      SamResourceId: LogoutFunction
  IsFollowerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: IsFollowerFunction
      Handler: IsFollowerHandler.handler
      Events:
        IsFollowerApi:
          Type: Api
          Properties:
            Path: /follower/isFollower
            Method: post
    Metadata:
      SamResourceId: IsFollowerFunction
  GetFollowersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowersFunction
      Handler: GetFollowersHandler.handler
      Events:
        GetFollowersApi:
          Type: Api
          Properties:
            Path: /follower/list
            Method: post
    Metadata:
      SamResourceId: GetFollowersFunction
  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetUserFunction
      Handler: GetUserHandler.handler
      Events:
        GetUserApi:
          Type: Api
          Properties:
            Path: /user/get
            Method: post
    Metadata:
      SamResourceId: GetUserFunction
  GetFolloweesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweesFunction
      Handler: GetFolloweesHandler.handler
      Events:
        GetFolloweesApi:
          Type: Api
          Properties:
            Path: /followee/list
            Method: post
    Metadata:
      SamResourceId: GetFolloweesFunction
  GetFeedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFeedFunction
      Handler: GetFeedHandler.handler
      Events:
        GetFeedApi:
          Type: Api
          Properties:
            Path: /status/feed
            Method: post
    Metadata:
      SamResourceId: GetFeedFunction
  GetStoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetStoryFunction
      Handler: GetStoryHandler.handler
      Events:
        GetStoryApi:
          Type: Api
          Properties:
            Path: /status/story
            Method: post
    Metadata:
      SamResourceId: GetStoryFunction
