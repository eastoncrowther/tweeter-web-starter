AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SAM Template for Tweeter Milestone 3
Globals:
  Function:
    Timeout: 10
    Runtime: nodejs18.x
    MemorySize: 256
    Tracing: Active
  Api:
    Cors:
      AllowMethods: '''OPTIONS,POST'''
      AllowHeaders: '''Content-Type'''
      AllowOrigin: '''*'''
Resources:
  GetFollowerCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFollowerCountFunction
      Handler: GetFollowerCountHandler.handler
      Events:
        GetFollowerCountApi:
          Type: Api
          Properties:
            Path: /follower/count
            Method: post
    Metadata:
      SamResourceId: GetFollowerCountFunction
  GetFolloweeCountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetFolloweeCountFunction
      Handler: GetFolloweeCountHandler.handler
      Events:
        GetFolloweeCountApi:
          Type: Api
          Properties:
            Path: /followee/count
            Method: post
    Metadata:
      SamResourceId: GetFolloweeCountFunction
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LoginFunction
      Handler: LoginHandler.handler
      Events:
        LoginApi:
          Type: Api
          Properties:
            Path: /login
            Method: post
    Metadata:
      SamResourceId: LoginFunction
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RegisterFunction
      Handler: RegisterHandler.handler
      Events:
        RegisterApi:
          Type: Api
          Properties:
            Path: /register
            Method: post
    Metadata:
      SamResourceId: RegisterFunction
  FollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: FollowFunction
      Handler: FollowHandler.handler
      Events:
        FollowApi:
          Type: Api
          Properties:
            Path: /follow
            Method: post
    Metadata:
      SamResourceId: FollowFunction
  UnfollowFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: UnfollowFunction
      Handler: UnfollowHandler.handler
      Events:
        UnfollowApi:
          Type: Api
          Properties:
            Path: /unfollow
            Method: post
    Metadata:
      SamResourceId: UnfollowFunction
